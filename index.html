<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bộ Công Cụ TKB - Web Edition</title>
    <script src="https://cdn.jsdelivr.net/pyodide/v0.25.0/full/pyodide.js"></script>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background-color: #f4f7f6; color: #333; max-width: 800px; margin: 0 auto; padding: 40px 20px; }
        .container { background: white; padding: 30px; border-radius: 12px; box-shadow: 0 4px 20px rgba(0,0,0,0.08); }
        h1 { color: #2c3e50; text-align: center; border-bottom: 2px solid #3498db; padding-bottom: 10px; }
        .status-box { padding: 10px; margin: 20px 0; border-radius: 5px; text-align: center; font-weight: bold; }
        .loading { background-color: #fff3cd; color: #856404; }
        .ready { background-color: #d4edda; color: #155724; }
        .error { background-color: #f8d7da; color: #721c24; }
        .upload-section { display: flex; flex-direction: column; gap: 20px; margin-top: 30px; }
        input[type="file"] { padding: 10px; border: 1px dashed #3498db; border-radius: 5px; cursor: pointer; }
        button { padding: 12px; background-color: #3498db; color: white; border: none; border-radius: 5px; font-size: 16px; cursor: pointer; transition: background 0.3s; }
        button:hover { background-color: #2980b9; }
        button:disabled { background-color: #bdc3c7; cursor: not-allowed; }
        #resultArea { margin-top: 30px; display: none; border-top: 1px solid #eee; padding-top: 20px; }
        textarea { width: 100%; padding: 10px; border-radius: 5px; border: 1px solid #ccc; font-family: monospace; background: #fafafa; }
        .btn-group { display: flex; gap: 10px; margin-top: 10px; }
        .btn-download { background-color: #27ae60; flex: 1; }
        .btn-copy { background-color: #8e44ad; flex: 1; }
    </style>
</head>
<body>

<div class="container">
    <h1>Bộ Công Cụ TKB</h1>
    
    <div id="status" class="status-box loading">Đang khởi tạo môi trường Python (WebAssembly)...</div>

    <div class="upload-section">
        <label><b>Tải lên file All_TKB.pdf:</b></label>
        <input type="file" id="pdfFile" accept=".pdf">
        
        <button id="runBtn" disabled>Bắt đầu xử lý</button>
    </div>

    <div id="resultArea">
        <h3>Kết quả xử lý:</h3>
        <textarea id="shortenOutput" rows="8" readonly></textarea>
        <div class="btn-group">
            <button id="downloadDocx" class="btn-download">Tải file TKB.docx</button>
            <button id="copyText" class="btn-copy">Sao chép TKB rút gọn</button>
        </div>
    </div>
</div>

<script>
    let pyodide;

    async function initPyodide() {
        const status = document.getElementById('status');
        try {
            pyodide = await loadPyodide();
            await pyodide.loadPackage("micropip");
            const micropip = pyodide.pyimport("micropip");
            
            status.innerText = "Đang tải thư viện xử lý PDF và Word...";
            await micropip.install(['pdfplumber', 'python-docx']);
            
            // Tải file Sample_TKB.docx từ Repo
            status.innerText = "Đang tải file mẫu từ repository...";
            const response = await fetch('Sample_TKB.docx');
            if (!response.ok) throw new Error("Không tìm thấy file Sample_TKB.docx trong repo!");
            const buffer = await response.arrayBuffer();
            pyodide.FS.writeFile('/Sample_TKB.docx', new Uint8Array(buffer));

            status.innerText = "Sẵn sàng!";
            status.className = "status-box ready";
            document.getElementById('runBtn').disabled = false;
        } catch (e) {
            status.innerText = "Lỗi khởi tạo: " + e.message;
            status.className = "status-box error";
        }
    }

    initPyodide();

    document.getElementById('runBtn').onclick = async () => {
        const fileInput = document.getElementById('pdfFile');
        if (fileInput.files.length === 0) return alert("Vui lòng chọn file PDF!");

        const runBtn = document.getElementById('runBtn');
        runBtn.disabled = true;
        runBtn.innerText = "Đang xử lý...";

        const file = fileInput.files[0];
        const arrayBuffer = await file.arrayBuffer();
        pyodide.FS.writeFile('/All_TKB.pdf', new Uint8Array(arrayBuffer));

        const pythonCode = `
import pdfplumber, re, docx
from docx.shared import Pt
from docx.oxml.ns import qn
from docx.enum.table import WD_ALIGN_VERTICAL
import io

SUBJECT_MAP = {
    'TOÁN': 'Toán', 'VĂN': 'Ngữ Văn', 'ANH': 'Tiếng Anh',
    'LÝ': 'Vật Lý', 'HÓA': 'Hóa Học', 'SINH': 'Sinh Học',
    'SỬ': 'Lịch Sử', 'ĐỊA': 'Địa Lý', 'TIN': 'Tin Học',
    'GDTC': 'GDTC', 'GDQP': 'GDQP', 'CN': 'Công Nghệ',
    'CNCN': 'Công Nghệ', 'CNNN': 'Công Nghệ', 
    'KTPL': 'GDKT&PL', 'HĐTN': 'HĐTN', 'GDĐP': 'GDĐP',
    'SHL': 'Sinh Hoạt', 'HĐSHDC': 'Chào cờ', 'GDKT-PL': 'GDKT&PL'
}

def clean_subject_name(raw_text):
    if not raw_text or raw_text.strip() == "": return "—"
    first_line = raw_text.split('\\n')[0].strip()
    if "10G" in first_line.upper(): return None
    prefix = first_line.split('-')[0].strip().upper()
    return SUBJECT_MAP.get(prefix, first_line)

def get_data():
    schedule_data = {day: [] for day in range(2, 8)}
    apply_date = "dd/mm/yyyy"
    with pdfplumber.open('/All_TKB.pdf') as pdf:
        page = pdf.pages[0]
        text = page.extract_text()
        date_match = re.search(r'NGÀY (\\d{2}[-/]\\d{2}[-/]\\d{4})', text, re.IGNORECASE)
        if date_match: apply_date = date_match.group(1).replace('-', '/')
        
        table = page.extract_tables()[0]
        class_col_idx = 8
        current_day = 2
        for row in table[1:]:
            if not any(row): continue
            thu_val = str(row[0]).strip()
            if thu_val.isdigit() and 2 <= int(thu_val) <= 7: current_day = int(thu_val)
            raw_subj = str(row[class_col_idx]).strip() if row[class_col_idx] else ""
            cleaned = clean_subject_name(raw_subj)
            if cleaned is not None:
                if len(schedule_data[current_day]) < 5: schedule_data[current_day].append(cleaned)
    return schedule_data, apply_date

def update_cell_precise(cell, new_text):
    if not cell.paragraphs: cell.add_paragraph()
    para = cell.paragraphs[0]
    is_dash = (new_text.strip() == "—")
    if para.runs:
        run = para.runs[0]
        run.text = new_text
        run.font.name = 'Mulish'
        if is_dash: run.font.size = Pt(12)
    else:
        run = para.add_run(new_text)
        run.font.name = 'Mulish'
    cell.vertical_alignment = WD_ALIGN_VERTICAL.CENTER

def process():
    data, date_str = get_data()
    doc = docx.Document('/Sample_TKB.docx')
    
    # Update Header
    for cell in doc.tables[0].rows[0].cells:
        if "dd/mm/yyyy" in cell.text:
            cell.text = cell.text.replace("dd/mm/yyyy", date_str)

    # Fill Table
    tkb_table = doc.tables[1]
    row_indices = [3, 4, 5, 6, 7]
    for day in range(2, 8):
        subjects = data[day]
        for i, row_idx in enumerate(row_indices):
            val = subjects[i] if i < len(subjects) else "—"
            update_cell_precise(tkb_table.cell(row_idx, day), val)
    
    doc.save('/TKB_Output.docx')

    # Shorten Logic
    short_lines = []
    for day in range(2, 8):
        day_subjs = [tkb_table.cell(i, day).text.strip() for i in range(3, 7) if tkb_table.cell(i, day).text.strip() != "—"]
        line = f"Thứ {day}: {' - '.join(day_subjs)}"
        # Add chiều nếu có
        chieu = tkb_table.cell(9, day).text.strip()
        if chieu != "—": line += f" | {chieu.replace('\\n', ' ')}"
        short_lines.append(line)
    
    return "\\n\\n".join(short_lines)

result_text = process()
`;

        try {
            const shortenText = await pyodide.runPythonAsync(pythonCode);
            document.getElementById('shortenOutput').value = shortenText;
            document.getElementById('resultArea').style.display = 'block';
            
            // Xử lý nút tải file
            document.getElementById('downloadDocx').onclick = () => {
                const outputData = pyodide.FS.readFile('/TKB_Output.docx');
                const blob = new Blob([outputData], { type: 'application/vnd.openxmlformats-officedocument.wordprocessingml.document' });
                const url = URL.createObjectURL(blob);
                const a = document.createElement('a');
                a.href = url;
                a.download = 'TKB_Da_Xu_Ly.docx';
                a.click();
            };

            // Nút Copy
            document.getElementById('copyText').onclick = () => {
                navigator.clipboard.writeText(shortenText);
                alert("Đã sao chép vào bộ nhớ tạm!");
            };

        } catch (err) {
            alert("Lỗi Python: " + err.message);
        } finally {
            runBtn.disabled = false;
            runBtn.innerText = "Bắt đầu xử lý";
        }
    };
</script>

</body>
</html>
